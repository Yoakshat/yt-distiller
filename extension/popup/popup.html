<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>YT Distiller</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a1a;
      color: #e8e8e8;
      width: 280px;
      padding: 20px;
    }

    h1 {
      font-size: 18px;
      font-weight: 700;
      color: #ff4444;
      letter-spacing: -0.3px;
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    input[type="password"] {
      width: 100%;
      background: #252525;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e8e8e8;
      font-size: 13px;
      padding: 8px 10px;
      outline: none;
    }

    input[type="password"]:focus { border-color: #555; }

    button {
      margin-top: 10px;
      width: 100%;
      background: #ff4444;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      padding: 8px;
      cursor: pointer;
    }

    button:hover { background: #e03333; }

    #status {
      margin-top: 12px;
      font-size: 11px;
      color: #555;
      min-height: 16px;
    }

    #status.ok { color: #44cc77; }
    #status.err { color: #ff5555; }

    .hint {
      margin-top: 14px;
      font-size: 11px;
      color: #555;
      line-height: 1.6;
    }

    a { color: #888; }
  </style>
</head>
<body>
  <h1>YT Distiller</h1>
  <label for="api-key">DeepSeek API Key</label>
  <input type="password" id="api-key" placeholder="sk-..." />
  <button id="save-btn">Save</button>
  <p id="status"></p>
  <p class="hint">Go to any YouTube video and click <strong>Distill ✶</strong> in the player controls.<br><br>Get a free key at <a href="https://platform.deepseek.com" target="_blank">platform.deepseek.com</a></p>
  <script src="popup.js"></script>
</body>
</html>
