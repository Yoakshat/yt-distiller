<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
<title>YT Distiller</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      width: 300px;
      padding: 20px;
    }

    h1 {
      font-size: 18px;
      font-weight: 700;
      color: #ff4444;
      margin-bottom: 18px;
      letter-spacing: -0.3px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #aaa;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input[type="password"] {
      width: 100%;
      padding: 9px 12px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e8e8e8;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="password"]:focus {
      border-color: #ff4444;
    }

    input[type="password"]::placeholder {
      color: #555;
    }

    button {
      margin-top: 12px;
      width: 100%;
      padding: 9px;
      background: #ff4444;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover {
      background: #e03333;
    }

    #status {
      margin-top: 10px;
      font-size: 12px;
      min-height: 18px;
      text-align: center;
      color: #aaa;
    }

    #status.error {
      color: #ff6666;
    }

    #status.success {
      color: #66cc66;
    }
  </style>
</head>
<body>
  <h1>YT Distiller</h1>

  <label for="apiKey">DeepSeek API Key</label>
  <input
    type="password"
    id="apiKey"
    placeholder="sk-..."
    autocomplete="off"
    spellcheck="false"
  />

  <button id="saveBtn">Save</button>

  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
