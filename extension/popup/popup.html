<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>YT Distiller</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a1a;
      color: #e8e8e8;
      width: 280px;
      padding: 20px;
    }

    h1 {
      font-size: 18px;
      font-weight: 700;
      color: #ff4444;
      letter-spacing: -0.3px;
      margin-bottom: 16px;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      background: #252525;
      border: 1px solid #333;
      border-radius: 8px;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot.green { background: #44cc77; box-shadow: 0 0 5px #44cc7788; }
    .dot.red   { background: #ff5555; box-shadow: 0 0 5px #ff555588; }
    .dot.grey  { background: #555; }

    #status-label {
      font-size: 13px;
      font-weight: 600;
    }

    #hint {
      margin-top: 14px;
      font-size: 11px;
      color: #666;
      line-height: 1.6;
    }

    #hint code {
      font-family: monospace;
      background: #252525;
      padding: 1px 5px;
      border-radius: 3px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <h1>YT Distiller</h1>
  <div class="status-row">
    <div class="dot grey" id="dot"></div>
    <span id="status-label">Checking…</span>
  </div>
  <p id="hint"></p>
  <script src="popup.js"></script>
</body>
</html>
